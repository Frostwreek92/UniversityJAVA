    public class NumerosPares {<br>
&emsp;public static void main(String[] args) {<br>
&emsp;&emsp;System.out.println("*** Números Pares del 0 al 20 ***");<br>
&emsp;&emsp;var contador = 0;<br>
&emsp;&emsp;while(contador &lt;= 20){<br>
&emsp;&emsp;&emsp;// Revisamos si es un numero par<br>
&emsp;&emsp;&emsp;if(contador % 2 == 0)<br>
&emsp;&emsp;&emsp;&emsp;System.out.print(contador + " ");<br>
&emsp;&emsp;&emsp;contador++;<br>
&emsp;&emsp;}<br>
&emsp;}<br>
}<br>
